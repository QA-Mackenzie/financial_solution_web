services:
  postgres:
    image: postgres:16-alpine
    container_name: shf-web-postgres
    environment:
      POSTGRES_DB: shf_web
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

volumes:
  postgres-data:

