# Blueprint pronto para importar no Render.
#
# Valores que o Render vai pedir na criacao inicial:
# - WEB_ORIGIN: use a URL publica do static site
# - VITE_API_URL: use a URL publica da API
#
# Se voce mantiver os nomes abaixo e o subdominio onrender.com ficar disponivel,
# os valores esperados tendem a ser:
# - WEB_ORIGIN=https://economy-cash-app.onrender.com
# - VITE_API_URL=https://economy-cash-api.onrender.com
#
# Se o Render atribuir outro subdominio, ajuste esses dois valores no dashboard
# apos o primeiro deploy.
#
# No plano free, a API aplica o schema base ao iniciar e por isso este Blueprint
# nao usa preDeployCommand.

previews:
  generation: off

databases:
  - name: economy-cash-db
    plan: free
    postgresMajorVersion: "16"
    databaseName: economy_cash
    user: economy_cash

services:
  - type: web
    name: economy-cash-api
    runtime: node
    plan: free
    numInstances: 1
    buildCommand: >-
      npm ci --include=dev &&
      npm run build --workspace @economy-cash/contracts &&
      npm run build --workspace @economy-cash/domain-core &&
      npm run build --workspace @economy-cash/api
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - tsconfig.base.json
        - apps/api/**
        - packages/contracts/**
        - packages/domain-core/**
        - infra/postgres/init/**
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: API_PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: economy-cash-db
          property: connectionString
      - key: WEB_ORIGIN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_COOKIE_NAME
        value: economy_cash_session
      - key: SESSION_TTL_HOURS
        value: "168"
      - key: SESSION_ABSOLUTE_TTL_HOURS
        value: "720"
      - key: PASSWORD_RESET_TOKEN_TTL_MINUTES
        value: "30"
      - key: EMAIL_VERIFICATION_TOKEN_TTL_HOURS
        value: "24"
      - key: AUTH_RATE_LIMIT_MAX
        value: "10"
      - key: AUTH_RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: PASSWORD_RECOVERY_RATE_LIMIT_MAX
        value: "5"
      - key: PASSWORD_RECOVERY_RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: EXPENSIVE_READ_RATE_LIMIT_MAX
        value: "60"
      - key: EXPENSIVE_READ_RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: AUTH_AUDIT_LOG_RETENTION_DAYS
        value: "180"
      - key: SESSION_RETENTION_DAYS
        value: "30"
      - key: TOKEN_RETENTION_DAYS
        value: "30"
      - key: PRIVACY_REQUEST_RETENTION_DAYS
        value: "730"
      - key: CONSENT_VERSION
        value: 2026-05
      - key: LOG_LEVEL
        value: info

  - type: web
    name: economy-cash-app
    runtime: static
    buildCommand: >-
      npm ci --include=dev &&
      npm run build --workspace @economy-cash/contracts &&
      npm run build --workspace @economy-cash/domain-core &&
      npm run build --workspace @economy-cash/web
    staticPublishPath: apps/web/dist
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - tsconfig.base.json
        - apps/web/**
        - packages/contracts/**
        - packages/domain-core/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: VITE_API_URL
        sync: false
      - key: VITE_CONSENT_VERSION
        value: 2026-05