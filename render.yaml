# Blueprint pronto para importar no Render.
#
# Valores que o Render vai pedir na criacao inicial:
# - WEB_ORIGIN: use a URL publica do static site
# - VITE_API_URL: use a URL publica da API
#
# Se voce mantiver os nomes abaixo e o subdominio onrender.com ficar disponivel,
# os valores esperados tendem a ser:
# - WEB_ORIGIN=https://solucao-financeira-web-app.onrender.com
# - VITE_API_URL=https://solucao-financeira-web-api.onrender.com
#
# Se o Render atribuir outro subdominio, ajuste esses dois valores no dashboard
# apos o primeiro deploy.

previews:
  generation: off

databases:
  - name: solucao-financeira-web-db
    plan: basic-256mb
    region: virginia
    postgresMajorVersion: "16"
    databaseName: shf_web
    user: shf_web

services:
  - type: web
    name: solucao-financeira-web-api
    runtime: node
    plan: free
    region: virginia
    numInstances: 1
    buildCommand: >-
      npm ci &&
      npm run build --workspace @shf/contracts &&
      npm run build --workspace @shf/domain-core &&
      npm run build --workspace @shf/api
    preDeployCommand: >-
      psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f infra/postgres/init/001-bootstrap-schema.sql &&
      psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f infra/postgres/init/003-auth-schema.sql &&
      psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f infra/postgres/init/004-finance-schema.sql
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - tsconfig.base.json
        - apps/api/**
        - packages/contracts/**
        - packages/domain-core/**
        - infra/postgres/init/**
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: API_PORT
        value: "10000"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: solucao-financeira-web-db
          property: connectionString
      - key: WEB_ORIGIN
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SESSION_COOKIE_NAME
        value: shf_session
      - key: SESSION_TTL_HOURS
        value: "168"
      - key: PASSWORD_RESET_TOKEN_TTL_MINUTES
        value: "30"
      - key: EMAIL_VERIFICATION_TOKEN_TTL_HOURS
        value: "24"
      - key: CONSENT_VERSION
        value: 2026-05
      - key: LOG_LEVEL
        value: info

  - type: web
    name: solucao-financeira-web-app
    runtime: static
    buildCommand: >-
      npm ci &&
      npm run build --workspace @shf/contracts &&
      npm run build --workspace @shf/domain-core &&
      npm run build --workspace @shf/web
    staticPublishPath: apps/web/dist
    autoDeployTrigger: commit
    buildFilter:
      paths:
        - package.json
        - package-lock.json
        - tsconfig.base.json
        - apps/web/**
        - packages/contracts/**
        - packages/domain-core/**
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: SKIP_INSTALL_DEPS
        value: "true"
      - key: VITE_API_URL
        sync: false
      - key: VITE_CONSENT_VERSION
        value: 2026-05